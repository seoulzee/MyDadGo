<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>아버님 전용 AI 기원</title>
    <style>
        body { text-align: center; background: #e9ecef; font-family: '맑은 고딕', sans-serif; }
        h1 { color: #2c3e50; margin-top: 30px; }
        p { color: #555; }
        canvas {
            background-color: #e4a054;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            border: 2px solid #333;
            cursor: pointer;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <h1>아버님 전용 AI 기원 🎴</h1>
    <p>AI 카타고와 연결되었습니다! 먼저 흑돌을 아무 데나 놓아보세요.</p>
    
    <canvas id="goBoard" width="570" height="570"></canvas>

    <script>
        const canvas = document.getElementById("goBoard");
        const ctx = canvas.getContext("2d");
        const boardSize = 19;
        const cellSize = 30;
        
        let boardData = Array(boardSize).fill().map(() => Array(boardSize).fill(0));
        let isMyTurn = true; // 아버님 차례인지 확인하는 자물쇠

        // 카타고 언어 번역기 (A~T, I는 제외)
        const LETTERS = "ABCDEFGHJKLMNOPQRST"; 
        
        function toGtpMove(x, y) {
            return LETTERS[x] + (19 - y); // 예: 3,3 -> D16
        }

        function toCanvasMove(gtpMove) {
            const gtpX = gtpMove.charAt(0);
            const gtpY = parseInt(gtpMove.substring(1));
            return { x: LETTERS.indexOf(gtpX), y: 19 - gtpY };
        }

        function drawBoard() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = "#000000"; ctx.lineWidth = 1;
            
            for (let i = 0; i < boardSize; i++) {
                ctx.beginPath(); ctx.moveTo(cellSize / 2, cellSize / 2 + i * cellSize); ctx.lineTo(canvas.width - cellSize / 2, cellSize / 2 + i * cellSize); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(cellSize / 2 + i * cellSize, cellSize / 2); ctx.lineTo(cellSize / 2 + i * cellSize, canvas.height - cellSize / 2); ctx.stroke();
            }
            
            const starPoints = [3, 9, 15];
            ctx.fillStyle = "#000000";
            for(let i of starPoints) for(let j of starPoints) {
                ctx.beginPath(); ctx.arc(cellSize / 2 + i * cellSize, cellSize / 2 + j * cellSize, 3, 0, 2 * Math.PI); ctx.fill();
            }
            
            for (let x = 0; x < boardSize; x++) {
                for (let y = 0; y < boardSize; y++) {
                    if (boardData[x][y] !== 0) {
                        ctx.beginPath();
                        ctx.arc(cellSize / 2 + x * cellSize, cellSize / 2 + y * cellSize, cellSize * 0.45, 0, 2 * Math.PI);
                        ctx.fillStyle = boardData[x][y] === 1 ? "#111111" : "#EEEEEE";
                        ctx.fill(); ctx.lineWidth = 1; ctx.strokeStyle = "#333"; ctx.stroke();
                    }
                }
            }
        }

        // 마우스 클릭 시 무전기 작동!
        canvas.addEventListener("click", function(event) {
            if (!isMyTurn) return; // 카타고가 생각 중일 땐 클릭 금지!

            const rect = canvas.getBoundingClientRect();
            const x = Math.round((event.clientX - rect.left - cellSize / 2) / cellSize);
            const y = Math.round((event.clientY - rect.top - cellSize / 2) / cellSize);

            if (x >= 0 && x < boardSize && y >= 0 && y < boardSize && boardData[x][y] === 0) {
                // 1. 바둑판에 내 흑돌 착! 그리기
                boardData[x][y] = 1;
                drawBoard();
                isMyTurn = false; // 자물쇠 잠그기

                // 2. 파이썬 서버로 "나 여기 뒀어!" 무전 치기
                const move = toGtpMove(x, y);
                
                fetch("https://suing-audacious-parabola.ngrok-free.dev", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ move: move, color: "B" })
                })
                .then(res => res.json())
                .then(data => {
                    // 3. 카타고가 답장을 줬을 때 백돌 착! 그리기
                    if (data.ai_move && data.ai_move !== "PASS" && data.ai_move !== "resign") {
                        const aiPos = toCanvasMove(data.ai_move);
                        boardData[aiPos.x][aiPos.y] = 2; // AI는 백돌
                    } else {
                        alert("카타고: 패스! (또는 기권)");
                    }
                    drawBoard();
                    isMyTurn = true; // 다시 내 차례! 자물쇠 열기
                })
                .catch(err => {
                    alert("서버 통신에 실패했습니다. 까만 창이 켜져 있는지 확인해 주세요!");
                    isMyTurn = true;
                });
            }
        });

        drawBoard(); // 시작할 때 빈 바둑판 그리기
    </script>
</body>
</html>
